<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Design Pattern 1 - ダーク × ネオン</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Noto Sans JP', sans-serif;
      background: #0a0a0a;
      color: #fff;
    }

    /* ===== Pattern Nav ===== */
    .design-nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      background: rgba(0,0,0,0.9); backdrop-filter: blur(10px);
      padding: 10px 20px;
      display: flex; gap: 12px; align-items: center; flex-wrap: wrap;
      font-size: 12px; border-bottom: 1px solid #333;
    }
    .design-nav span { color: #666; font-weight: bold; letter-spacing: 1px; }
    .design-nav a { color: #888; text-decoration: none; padding: 4px 10px; border-radius: 4px; }
    .design-nav a.active { background: #fff; color: #000; font-weight: bold; }
    .design-nav a:hover { color: #fff; }

    /* ===== Phone Frame ===== */
    .phone {
      max-width: 420px;
      margin: 70px auto 40px;
      background: #111;
      border-radius: 32px;
      min-height: 720px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 0 0 60px rgba(0, 255, 170, 0.08);
    }

    /* ===== Header ===== */
    .header {
      padding: 20px 24px 12px;
      display: flex; justify-content: space-between; align-items: center;
    }
    .logo {
      font-size: 14px; font-weight: 700; color: #555;
      letter-spacing: 1px;
    }
    .menu-dots {
      display: flex; gap: 4px;
    }
    .menu-dots span {
      width: 4px; height: 4px; background: #555; border-radius: 50%;
    }

    /* ===== Main ===== */
    .main {
      flex: 1; display: flex; flex-direction: column;
      justify-content: center; padding: 0 28px 48px;
    }

    .catchcopy {
      font-size: 20px; font-weight: 900;
      text-align: center; margin-bottom: 24px;
      background: linear-gradient(135deg, #00ffaa, #00ccff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      line-height: 1.5;
    }

    .input-area {
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 16px;
      padding: 18px;
      min-height: 140px;
      font-size: 15px;
      color: #555;
      line-height: 1.6;
    }

    .btn {
      margin-top: 16px;
      padding: 18px;
      text-align: center;
      border: none; border-radius: 16px;
      font-size: 16px; font-weight: 900;
      cursor: pointer;
      background: linear-gradient(135deg, #00ffaa, #00ccff);
      color: #000;
      letter-spacing: 1px;
    }

    .pattern-label {
      text-align: center; margin-top: 24px;
      font-size: 11px; color: #333;
      letter-spacing: 2px;
    }
  </style>
</head>
<body>

<div class="design-nav">
  <span>DESIGN PATTERNS</span>
  <a href="pattern1.html" class="active">1. ダーク×ネオン</a>
  <a href="pattern2.html">2. ポップ×カラフル</a>
  <a href="pattern3.html">3. ミニマル×ホワイト</a>
  <a href="pattern4.html">4. グラデーション×温かみ</a>
  <a href="pattern5.html">5. 手書き×カジュアル</a>
</div>

<div class="phone">
  <div class="header">
    <div class="logo">ネガポジ変換</div>
    <div class="menu-dots"><span></span><span></span><span></span></div>
  </div>

  <div class="main">
    <div class="catchcopy">モヤモヤを入れたら、<br>笑って戻れる。</div>

    <div class="input-area">ここに書いてみて...</div>

    <div class="btn">気持ち切り替える！</div>

    <div class="pattern-label">PATTERN 1 / ダーク × ネオングリーン</div>
  </div>
</div>

</body>
</html>
