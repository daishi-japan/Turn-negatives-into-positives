<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mono 4 - カード浮き</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;500;700;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Noto Sans JP', sans-serif;
      background: #e4e4e4;
      color: #111;
    }

    .design-nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      background: #000; padding: 10px 20px;
      display: flex; gap: 10px; align-items: center; flex-wrap: wrap;
      font-size: 12px;
    }
    .design-nav span { color: #555; font-weight: bold; letter-spacing: 1px; }
    .design-nav a { color: #666; text-decoration: none; padding: 4px 10px; border-radius: 4px; }
    .design-nav a.active { background: #fff; color: #000; font-weight: bold; }
    .design-nav a:hover { color: #fff; }

    .phone {
      max-width: 420px;
      margin: 70px auto 40px;
      background: #f0f0f0;
      border-radius: 32px;
      min-height: 720px;
      display: flex; flex-direction: column;
      overflow: hidden;
    }

    .header {
      padding: 20px 24px 12px;
      display: flex; justify-content: space-between; align-items: center;
    }
    .logo { font-size: 13px; font-weight: 500; color: #aaa; letter-spacing: 2px; }
    .menu-line { width: 20px; height: 2px; background: #bbb; border-radius: 1px; }

    .main {
      flex: 1; display: flex; flex-direction: column;
      justify-content: center; padding: 0 24px 48px;
    }

    .card {
      background: #fff;
      border-radius: 20px;
      padding: 36px 28px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.08);
    }

    .catchcopy {
      font-size: 20px; font-weight: 900;
      text-align: center; margin-bottom: 28px;
      color: #111; line-height: 1.6;
    }
    .catchcopy .accent {
      display: inline-block;
      border-bottom: 3px solid #000;
      padding-bottom: 2px;
    }

    .input-area {
      background: #f7f7f7;
      border: 1px solid #e5e5e5;
      border-radius: 12px;
      padding: 18px;
      min-height: 130px;
      font-size: 15px; color: #ccc; line-height: 1.6;
    }

    .btn {
      margin-top: 20px; padding: 16px;
      text-align: center;
      border: none; border-radius: 12px;
      font-size: 15px; font-weight: 900; cursor: pointer;
      background: #111; color: #fff;
    }
    .btn:hover { background: #333; }

    .pattern-label {
      text-align: center; margin-top: 32px;
      font-size: 11px; color: #ccc; letter-spacing: 2px;
    }
  </style>
</head>
<body>

<div class="design-nav">
  <span>MONO</span>
  <a href="mono1.html">1 シャープ</a>
  <a href="mono2.html">2 ソフト</a>
  <a href="mono3.html">3 タイポ</a>
  <a href="mono4.html" class="active">4 カード</a>
  <a href="mono5.html">5 反転</a>
</div>

<div class="phone">
  <div class="header">
    <div class="logo">ネガポジ変換</div>
    <div class="menu-line"></div>
  </div>
  <div class="main">
    <div class="card">
      <div class="catchcopy">モヤモヤを入れたら、<br><span class="accent">笑って戻れる。</span></div>
      <div class="input-area">ここに書いてみて...</div>
      <div class="btn">気持ちを切り替える</div>
    </div>
    <div class="pattern-label">MONO 4 / カード浮き — グレー背景に白カードが浮く構成</div>
  </div>
</div>

</body>
</html>
